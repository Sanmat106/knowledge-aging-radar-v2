━━━ ARCHITECTURE OVERVIEW ━━━
Project Orion adopts a microservices architecture deployed on Microsoft Azure (UK South region) with active-active failover to UK West. Core banking processing is handled by Temenos T24 R21 with a custom API orchestration layer (Node.js / Express) providing RESTful interfaces for all consumer-facing and internal integrations.

━━━ COMPONENT INVENTORY ━━━
Core Banking Engine:       Temenos T24 R21 — account management, payments, lending
API Orchestration Layer:   Node.js 18 LTS / Express — REST + GraphQL gateway
Digital Onboarding:        React 18 SPA + Jumio NetVerify for biometric KYC
Wealth Management Module:  BlackRock Aladdin Wealth API integration + custom portfolio dashboard
Regulatory Reporting:      Custom ETL pipeline (Python 3.11) + Tableau Server 2024.1
Data Migration:            AWS DMS + custom transformation scripts (Python)
Identity & Access:         Azure AD B2C + Okta (workforce IAM)
Infrastructure:            Azure AKS (Kubernetes 1.28), Terraform IaC, GitHub Actions CI/CD

━━━ WEALTH MANAGEMENT MODULE — TECHNICAL SCOPE ━━━
The Wealth Management Module (in scope per Business Case ACC-GBP-BC-001) comprises:
- BlackRock Aladdin Wealth API integration for portfolio analytics
- Custom ISA/SIPP digital wrapper UI (React components, 14 screens)
- Robo-advisory decision engine (Python ML service, Azure ML)
- AUM dashboard for relationship managers (Tableau embedded)
Technical Lead for WM components: David Okafor (architecture sign-off authority)

━━━ SECURITY ARCHITECTURE ━━━
Data classification: RESTRICTED (customer PII) and CONFIDENTIAL (financial data)
Encryption: AES-256 at rest, TLS 1.3 in transit

━━━ INFRASTRUCTURE SIZING ━━━

/* ── SCORING ─────────────────────────────────────────────────────── */
function calcScore(doc){
  const raw = Math.max(0, 100 - (doc.daysAgo / doc.staleThreshold) * 100);
  return Math.max(0, Math.round(raw - (doc.authorOnProject ? 0 : 15)));
}
function calcRag(s){ return s >= 60 ? "green" : s >= 30 ? "amber" : "red"; }
const scored = DOCS.map(d => ({ ...d, score: calcScore(d), rag: calcRag(calcScore(d)) }));

/* ── API ─────────────────────────────────────────────────────────── */
async function callAI(apiKey, prompt, maxTokens=4096){
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-calls":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})
  });
  if(!r.ok){const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||`API error ${r.status}`);}
  return (await r.json()).content[0].text.trim();
}

async function getContradictions(apiKey){
  const docs = scored.map(d=>`=== ${d.title} (${d.type}, ${d.daysAgo} days old, author ${d.authorOnProject?"ACTIVE":"LEFT PROJECT"}) ===\n${d.content}`).join("\n\n");
  const text = await callAI(apiKey,`You are an expert document analyst for Accenture consulting engagement "Project Orion" (client: GlobalBank PLC).
Analyse these ${scored.length} project documents and identify ALL explicit factual contradictions. Focus on: go-live dates, revenue targets, personnel/roles, scope items, budget figures.
Trust hierarchy: Status Reports > Meeting Minutes > RAID Logs > Financial Reports > Project Plans > Architecture Docs > Strategy Decks > Business Cases > Change Plans > Migration Strategies.
For people/roles: most recently dated document wins. RAID Log and Meeting Minutes entries explicitly recording a change override older docs.
Return ONLY a valid JSON array (no markdown):
[{"topic":"short name","claimA":{"document":"exact title","claim":"verbatim claim","age":"X days old"},"claimB":{"document":"exact title","claim":"verbatim claim","age":"X days old"},"trustedDocument":"exact title","trustReason":"one sentence","recommendedFix":"specific action","severity":"CRITICAL or HIGH or MEDIUM"}]
DOCUMENTS:\n${docs}`);
  const m=text.match(/\[[\s\S]*\]/);
  if(!m) throw new Error("Could not parse AI response as JSON.");
  return JSON.parse(m[0]);
}

async function getNarrative(apiKey,contradictions){
  return callAI(apiKey,`You are a senior Accenture Partner writing a 3-sentence executive briefing for the Programme Director of Project Orion (GlobalBank PLC). ${contradictions.length} contradictions were found across ${scored.length} programme documents. Name the most critical issues specifically, state the governance risk they create, and give the single most urgent recommended action. Professional consulting tone. No bullet points.\n\nContradictions: ${JSON.stringify(contradictions)}`,500);
}

          </div>
        </div>}

        {tab==="documents"&&<div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:760}}>
            <thead><tr style={{borderBottom:`1px solid ${C.b1}`}}>
              {["Document","Type","Author","Age","Freshness","Health","Author Status",""].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left"}}><Lbl>{h}</Lbl></th>)}
            </tr></thead>
            <tbody>{scored.map(doc=>{const r=RAG[doc.rag]; return(
              <tr key={doc.id} style={{borderBottom:`1px solid ${C.b1}`,transition:"background 0.15s"}}
                onMouseOver={e=>e.currentTarget.style.background=C.s1} onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                <td style={{padding:"15px 14px",fontSize:14,fontWeight:700}}>{doc.title}</td>
                <td style={{padding:"15px 14px"}}><Lbl color={C.d}>{doc.type}</Lbl></td>
                <td style={{padding:"15px 14px",fontSize:13,color:C.m}}>{doc.author}</td>
                <td style={{padding:"15px 14px",fontSize:13,color:C.d}}>{doc.daysAgo}d</td>
                <td style={{padding:"15px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{background:C.s2,height:4,width:72,borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${doc.score}%`,background:r.fg,borderRadius:2}}/>
                    </div>
                    <span style={{fontSize:13,fontWeight:700,color:r.fg}}>{doc.score}</span>
                  </div>
                </td>
                <td style={{padding:"15px 14px"}}><Bdg text={r.lbl} fg={r.fg} bg={r.bg}/></td>
                <td style={{padding:"15px 14px"}}>{doc.authorOnProject?<span style={{fontSize:12,color:C.gr}}>● Active</span>:<span style={{fontSize:12,color:C.am}}>⚠ Left</span>}</td>
                <td style={{padding:"15px 14px"}}>
                  <button onClick={()=>setViewDoc(doc)} style={{background:"transparent",border:`1px solid ${C.b2}`,color:C.m,padding:"4px 12px",borderRadius:4,fontSize:11,cursor:"pointer",letterSpacing:"0.05em"}}>Preview</button>
                </td>
              </tr>
            );})}
            </tbody>
          </table>
        </div>}

        {tab==="contradictions"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{marginBottom:10,display:"flex",alignItems:"center",gap:16}}>
            <Lbl>{results.contradictions.length} Contradictions · Sorted Critical First</Lbl>
            <span style={{fontSize:12,color:C.d}}>Click any row to expand</span>
          </div>
          {results.contradictions.map((c,i)=>{const sv=SEV[c.severity]||SEV.MEDIUM,open=!!exp[i]; return(
            <div key={i} style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:8,overflow:"hidden"}}>
              <button onClick={()=>setExp(p=>({...p,[i]:!p[i]}))} style={{width:"100%",background:"transparent",border:"none",padding:"18px 22px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",color:C.w,textAlign:"left"}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <Bdg text={c.severity} fg={sv.fg} bg={sv.bg}/>
                  <span style={{fontSize:15,fontWeight:700,letterSpacing:"-0.015em"}}>{c.topic}</span>
                </div>
                <span style={{color:C.d,fontSize:18,flexShrink:0,marginLeft:12}}>{open?"▲":"▼"}</span>
              </button>
              {open&&<div style={{padding:"0 22px 22px",borderTop:`1px solid ${C.b1}`}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:18,marginBottom:14}}>
                  {[c.claimA,c.claimB].map((cl,j)=>(
                    <div key={j} style={{background:C.s2,border:`1px solid ${C.b1}`,borderRadius:6,padding:"14px 16px"}}>
                      <Lbl>{cl.document}</Lbl>
                      <div style={{fontSize:11,color:C.d,marginTop:3,marginBottom:10}}>{cl.age}</div>
                      <p style={{fontSize:14,color:"#ddd",lineHeight:1.55,margin:0}}>"{cl.claim}"</p>
                    </div>
                  ))}
                </div>
                <div style={{background:C.pd,border:`1px solid ${C.pb}`,borderRadius:6,padding:"14px 16px",marginBottom:10}}>
                  <Lbl color={C.p}>Trust Recommendation</Lbl>
                  <div style={{fontSize:14,fontWeight:700,margin:"8px 0 5px"}}>→ {c.trustedDocument}</div>
                  <div style={{fontSize:13,color:C.m,lineHeight:1.55}}>{c.trustReason}</div>
                </div>
                <div style={{background:C.s2,border:`1px solid ${C.b1}`,borderRadius:6,padding:"14px 16px"}}>
                  <Lbl>Recommended Fix</Lbl>
                  <p style={{fontSize:13,color:"#bbb",lineHeight:1.6,margin:"8px 0 0"}}>{c.recommendedFix}</p>
                </div>
              </div>}
            </div>
          );})}
        </div>}
      </div>
    </div>
  );
}

/* ── APP ROOT ─────────────────────────────────────────────────────── */
function App(){
  const [screen,setScreen]=useState("landing");
  const [apiKey,setApiKey]=useState("");
  const [step,setStep]=useState(0);
  const [results,setResults]=useState(null);
  const [error,setError]=useState(null);

  async function run(){
    if(!apiKey.trim()){setError("Please enter your Anthropic API key.");return;}
    setError(null);setScreen("scanning");setStep(0);
    try{
      for(let i=0;i<3;i++){setStep(i);await new Promise(r=>setTimeout(r,550));}
      setStep(3);
      const contradictions=await getContradictions(apiKey);
      setStep(4);await new Promise(r=>setTimeout(r,400));
      setStep(5);
      const narrative=await getNarrative(apiKey,contradictions);
      setStep(6);await new Promise(r=>setTimeout(r,500));
      const sorted=[...contradictions].sort((a,b)=>({CRITICAL:0,HIGH:1,MEDIUM:2}[a.severity]??3)-({CRITICAL:0,HIGH:1,MEDIUM:2}[b.severity]??3));
      const avg=Math.round(scored.reduce((s,d)=>s+d.score,0)/scored.length);
      setResults({contradictions:sorted,narrative,overallHealth:avg,criticalCount:sorted.filter(c=>c.severity==="CRITICAL").length});
      setScreen("results");
    }catch(err){setError(`Analysis failed: ${err.message}`);setScreen("landing");}
  }

  if(screen==="scanning") return <Scanning step={step}/>;
  if(screen==="results"&&results) return <Results results={results} onBack={()=>setScreen("landing")}/>;
  return <Landing apiKey={apiKey} setApiKey={setApiKey} onRun={run} error={error}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
